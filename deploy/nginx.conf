# ============================================================================
# SaviSanju Collections — Nginx reverse proxy (HTTPS termination)
# ============================================================================
# Place at: /etc/nginx/sites-available/savisanju-api  (symlink into sites-enabled)
# Then: nginx -t && systemctl reload nginx
#
# Assumptions:
#   * Node API listens on 127.0.0.1:5000 (see deploy/savisanju-api.service).
#   * TLS certs obtained via certbot (see deploy/SECURITY-DEPLOYMENT.md).
#   * App is configured with TRUST_PROXY_HOPS=1 (this is the single proxy hop).
# Replace api.savisanju.com with your real API hostname.
# ============================================================================

# --- Rate-limit zone (optional, defense-in-depth on top of app limiter) ---
# 10 r/s with bursts; tune to taste. Keyed on the real client IP.
limit_req_zone $binary_remote_addr zone=savisanju_api:10m rate=10r/s;

# --- HTTP : redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name api.savisanju.com;

    # Allow ACME HTTP-01 challenges (certbot) to pass through.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS : reverse proxy to the Node API ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.savisanju.com;

    # TLS — paths managed by certbot.
    ssl_certificate     /etc/letsencrypt/live/api.savisanju.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.savisanju.com/privkey.pem;

    # Modern, safe TLS defaults.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SaviSanjuSSL:10m;
    ssl_session_tickets off;

    # ── Security headers ──
    # HSTS: force HTTPS for 1 year (only enable once HTTPS is confirmed working).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # The API returns JSON only; a tight CSP prevents any injected HTML executing.
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # Upload size: multer permits up to 4 files x 5 MB (~20 MB) per request, plus
    # multipart overhead. 6m would reject legitimate multi-image uploads, so we
    # allow 25m. (The JSON body limit in the app is 10mb for non-upload routes.)
    client_max_body_size 25m;

    # Don't leak the Nginx version.
    server_tokens off;

    location / {
        # Optional per-IP rate limit (app also enforces its own limits).
        limit_req zone=savisanju_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # Forward the real client IP/proto. The app trusts exactly ONE hop
        # (TRUST_PROXY_HOPS=1), so these headers drive correct rate-limit keying.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}
